name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-agent:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            extension: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            extension: ".exe"
          - os: macos-latest
            goos: darwin
            goarch: amd64
            extension: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            extension: ""
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare build info
        id: meta
        run: |
          echo "build_time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"
          echo "binary_name=xuannexus-agent-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.extension }}" >> "$GITHUB_OUTPUT"

      - name: Set CGO_ENABLED
        run: |
          if [[ "${{ runner.os }}" == "Windows" && "${{ matrix.goos }}" == "windows" ]] || \
             [[ "${{ runner.os }}" == "Linux" && "${{ matrix.goos }}" == "linux" ]] || \
             [[ "${{ runner.os }}" == "macOS" && "${{ matrix.goos }}" == "darwin" ]]; then
            echo "CGO_ENABLED=1" >> $GITHUB_ENV
          else
            echo "CGO_ENABLED=0" >> $GITHUB_ENV
          fi

      - name: Build agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p build
          ldflags="-s -w -X 'main.Version=${{ github.ref_name }}' -X 'main.BuildTime=${{ steps.meta.outputs.build_time }}' -X 'main.GitCommit=${{ github.sha }}'"
          go build -ldflags "$ldflags" -o "build/${{ steps.meta.outputs.binary_name }}" ./cmd/agent

      - name: Upload agent artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/${{ steps.meta.outputs.binary_name }}

  release:
    runs-on: ubuntu-latest
    needs:
      - build-agent
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: XuanNexus Agent ${{ github.ref_name }}
          files: |
            release-assets/**/*
